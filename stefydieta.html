<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dieta Accessibile - Stefania</title>

    <link rel="icon" type="image/png" sizes="192x192" href="icona.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icona.png">

    <style>
        /* Struttura fluida e pulita per evitare qualsiasi sovrapposizione */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* BARRA SUPERIORE FISSA: Si adatta dinamicamente all'altezza dei bottoni */
        .area-superiore-fissa {
            flex-shrink: 0;
            background-color: #f4f4f4;
            padding: 10px 15px;
            border-bottom: 2px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        h1 { text-align: center; color: #2c3e50; font-size: 20px; margin: 0 0 5px 0; }
        .sottotitolo { text-align: center; color: #555; font-size: 14px; margin: 0 0 12px 0; }
        
        /* Griglia flessibile dei giorni: si adatta su smartphone senza accavallarsi */
        .giorni-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
        }
        @media (max-width: 480px) {
            .giorni-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .btn-giorno { padding: 10px 2px; font-size: 14px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-giorno.attivo { background-color: #27ae60; font-weight: bold; border: 2px solid #1e7e34; }
        
        /* AREA CENTRALE DI SCORRIMENTO: Inizia sempre in modo sicuro DOPO la barra dei giorni */
        .area-centrale-scorrimento {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* Titolo del giorno: ora è totalmente visibile e separato */
        .titolo-giorno-corrente {
            color: #2c3e50;
            margin: 5px 0 15px 0;
            font-size: 22px;
            border-left: 5px solid #27ae60;
            padding-left: 10px;
        }

        /* Contenitori dei Pasti */
        .pasto-box { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .pasto-titolo { color: #d35400; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 18px; }
        ul { padding-left: 20px; margin: 5px 0 0 0; }
        li { margin-bottom: 8px; font-size: 17px; line-height: 1.4; }
        
        .info-versione {
            position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #aaa; font-style: italic; z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="info-versione">Versione 5.0 (Inizio 22 Maggio Calibrato)</div>

    <div class="area-superiore-fissa">
        <h1>Dieta Personalizzata Stefania</h1>
        <p class="sottotitolo">Periodo: dal 22 Maggio al 7 Luglio</p>

        <nav class="giorni-grid">
            <button class="btn-giorno" onclick="mostraGiorno(0)">Lunedì</button>
            <button class="btn-giorno" onclick="mostraGiorno(1)">Martedì</button>
            <button class="btn-giorno" onclick="mostraGiorno(2)">Mercoledì</button>
            <button class="btn-giorno" onclick="mostraGiorno(3)">Giovedì</button>
            <button class="btn-giorno" onclick="mostraGiorno(4)">Venerdì</button>
            <button class="btn-giorno" onclick="mostraGiorno(5)">Sabato</button>
            <button class="btn-giorno" onclick="mostraGiorno(6)">Domenica</button>
        </nav>
    </div>

    <div class="area-centrale-scorrimento" id="area-scroll">
        <main id="contenuto-dieta">
            </main>
    </div>

    <script>
        // Database della dieta di Stefania dal PDF
        const dieta = [
            {
                giorno: "Lunedì",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Cereali (media) 50 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Pasta integrale 70 g", "Legumi passati/frullati (peso secco) 50 g", "Olio di oliva extravergine 10 g"],
                    "Merenda": ["Yogurt greco 0% (fruyo) 170 g"],
                    "Cena": ["Pollo - petto 150 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Granetti integrali Mulino Bianco 30 g", "Frutta fresca (media) 150 g"]
                }
            },
            {
                giorno: "Martedì",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Frollini BuoniCosì (Galbusera) 50 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Pasta integrale 70 g", "Grana 30 g", "Olio di oliva extravergine 10 g", "Verdure (media) 200 g"],
                    "Merenda": ["Actimel (bevanda a base di latte) 100 g", "Mandorle dolci secche 20 g"],
                    "Cena": ["Pesce (media) 150 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Granetti integrali Mulino Bianco 30 g", "Frutta fresca (media) 150 g"]
                }
            },
            {
                giorno: "Mercoledì",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Fette biscottate integrali 30 g", "Marmellata 20 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Frisella 70 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Tonno al naturale in salamoia 80 g"],
                    "Merenda": ["Yogurt greco 0% (fruyo) 170 g"],
                    "Cena": ["Ricotta di vacca 100 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Frisella 50 g", "Frutta fresca (media) 150 g"]
                }
            },
            {
                giorno: "Giovedì",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Cereali (media) 50 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Pasta integrale 70 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Parmigiano grattugiato 10 g"],
                    "Merenda": ["Actimel (bevanda a base di latte) 100 g", "Mandorle dolci secche 20 g"],
                    "Cena": ["Uovo di gallina intero 120 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Granetti integrali Mulino Bianco 30 g", "Frutta fresca (media) 150 g"]
                }
            },
            {
                giorno: "Venerdì",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Frollini BuoniCosì (Galbusera) 50 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Pasta integrale 70 g", "Legumi passati/frullati (peso secco) 50 g", "Olio di oliva extravergine 10 g"],
                    "Merenda": ["Yogurt greco 0% (fruyo) 170 g"],
                    "Cena": ["Hamburger 150 g", "Granetti integrali Mulino Bianco 30 g", "Olio di oliva extravergine 10 g", "Verdure (media) 200 g", "Frutta fresca (media) 150 g"]
                }
            },
            {
                giorno: "Sabato",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Fette biscottate integrali 30 g", "Marmellata 20 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Pesce (media) 150 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Riso integrale 70 g"],
                    "Merenda": ["Actimel (bevanda a base di latte) 100 g", "Mandorle dolci secche 20 g"],
                    "Cena": ["Pizza (media) 250 g"]
                }
            },
            {
                giorno: "Domenica",
                pasti: {
                    "Colazione": ["Latte zymil 200 g", "Cereali (media) 50 g"],
                    "Spuntino Mattina": ["Frutta fresca (media) 150 g"],
                    "Pranzo": ["Pasta (media) 70 g", "Condimento libero 50 g", "Olio di oliva extravergine 10 g", "Parmigiano grattugiato 10 g"],
                    "Merenda": ["Dolci vari (media) 1 g"],
                    "Cena": ["Uovo di gallina intero 120 g", "Verdure (media) 200 g", "Olio di oliva extravergine 10 g", "Frisella 50 g", "Frutta fresca (media) 150 g"]
                }
            }
        ];

        let giornoCorrente = 0;

        // Trova il giorno reale odierno (0 = Lunedì, 6 = Domenica)
        function calcolaGiornoAttuale() {
            const dataOggi = new Date();
            const jsDay = dataOggi.getDay(); 
            let mioIndice = jsDay - 1;       
            if (mioIndice === -1) { 
                mioIndice = 6; 
            }
            return mioIndice;
        }

        function mostraGiorno(indice) {
            giornoCorrente = indice;
            const datiGiorno = dieta[giornoCorrente];
            const contenitore = document.getElementById("contenuto-dieta");
            const areaScroll = document.getElementById("area-scroll");
            
            // Aggiorna lo stato grafico dei pulsanti verdi
            const bottoni = document.querySelectorAll('.btn-giorno');
            bottoni.forEach((b, i) => {
                if(i === indice) {
                    b.classList.add('attivo');
                } else {
                    b.classList.remove('attivo');
                }
            });

            // Ricostruisce la pagina inserendo prima il titolo e poi i blocchi cibo
            let htmlDati = `<h2 class="titolo-giorno-corrente">Menu di ${datiGiorno.giorno}</h2>`;
            
            for (const [pasto, alimenti] of Object.entries(datiGiorno.pasti)) {
                htmlDati += `
                    <div class="pasto-box">
                        <h3 class="pasto-titolo">${pasto}</h3>
                        <ul>
                            ${alimenti.map(alimento => `<li>${alimento}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            contenitore.innerHTML = htmlDati;
            areaScroll.scrollTop = 0;
        }

        // Avvio automatico posizionato sul giorno reale di oggi
        giornoCorrente = calcolaGiornoAttuale();
        mostraGiorno(giornoCorrente);
    </script>
</body>
</html>
